<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bettinwear | Official Store</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:title" content="Bettinwear | Official Store">
    <meta property="og:description" content="Francia • España • Portugal. Únete a la lista privada y recibe un obsequio exclusivo el 01.04.">
    <meta property="og:image" content="preview.png">
    <meta property="og:url" content="https://bettinwear.com">

    <script async type="text/javascript" src="https://static.klaviyo.com/onsite/js/klaviyo.js?company_id=pk_4e9930ef2b13354fccd3795c1c91d8cb88"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 20px;
            box-sizing: border-box;
            text-align: center;
            overflow-x: hidden;
        }

        .logo {
            font-size: 3.5rem;
            letter-spacing: 15px;
            font-weight: 100;
            text-transform: uppercase;
            margin-bottom: 0;
            width: 100%;
            display: block;
        }

        .magenta { color: #CF3476; font-weight: 200; }

        .divider {
            width: 60px;
            height: 1px;
            background-color: #CF3476;
            margin: 40px 0;
        }

        .paises {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            font-weight: 200;
            margin-bottom: 10px;
        }

        .coming-soon {
            font-size: 1.4rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 35px;
        }

        /* KLAVIYO FORM */
        .newsletter-container {
            margin-bottom: 50px;
            width: 100%;
            max-width: 420px;
        }

        .gift-text {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #CF3476;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 400;
            line-height: 1.5;
        }

        .klaviyo_styling {
            display: flex;
            gap: 10px;
        }

        input[type="email"] {
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 14px 15px;
            flex-grow: 1;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s;
            border-radius: 0;
            -webkit-appearance: none;
        }

        input[type="email"]:focus { border-color: #CF3476; }

        .btn-submit {
            background-color: #CF3476;
            color: white;
            border: none;
            padding: 14px 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: opacity 0.3s;
            border-radius: 0;
        }

        .btn-submit:hover { opacity: 0.8; }

        .countdown {
            font-size: 3rem;
            font-weight: 100;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
        }

        /* MOBILE FIXES - SEGURIDAD TOTAL PARA LA "R" */
        @media (max-width: 480px) {
            .logo { 
                font-size: 1.7rem; 
                letter-spacing: 6px; /* Reducido para que la R no se corte nunca */
                padding: 0 5px;
            }
            .divider { margin: 30px 0; }
            .coming-soon { font-size: 1rem; letter-spacing: 5px; }
            .countdown { font-size: 2.2rem; letter-spacing: 2px; }
            .klaviyo_styling { flex-direction: column; gap: 15px; }
            .btn-submit { width: 100%; }
        }

        @media (max-width: 340px) {
            .logo { font-size: 1.4rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <div class="logo">BETTIN<span class="magenta">W</span>EAR</div>
    
    <div class="divider"></div>

    <div class="paises">Francia • España • Portugal</div>
    <div class="coming-soon">Coming Soon</div>

    <div class="newsletter-container">
        <div class="gift-text">Únete a la lista privada y recibe un obsequio exclusivo en la apertura</div>
        
        <form id="email_signup" class="klaviyo_styling" action="//manage.kmail-lists.com/subscriptions/subscribe" method="POST">
            <input type="hidden" name="g" value="LIST_ID_AQUÍ">
            <input type="email" name="email" id="k_id_email" placeholder="TU EMAIL" required>
            <button type="submit" class="btn-submit">UNIRSE</button>
        </form>
    </div>

    <div class="countdown" id="timer">...</div>

    <script>
        const targetDate = new Date("April 1, 2026 21:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) {
                document.getElementById("timer").innerHTML = "OPEN NOW";
                return;
            }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            const format = (num) => num.toString().padStart(2, '0');
            document.getElementById("timer").innerHTML = `${format(days)}d ${format(hours)}h ${format(minutes)}m ${format(seconds)}s`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
