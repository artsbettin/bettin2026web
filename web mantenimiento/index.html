<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bettinwear | Coming Soon</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            letter-spacing: 15px; /* Espaciado muy amplio = elegancia */
            font-weight: 200;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        /* El magenta solo en una letra o detalle pequeño es lo más sutil */
        .magenta {
            color: #FF00FF;
        }

        .divider {
            width: 40%;
            height: 0.5px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
        }

        .info {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888; /* Gris suave para que no compita con el logo */
            margin-bottom: 40px;
        }

        h2 {
            font-size: 0.9rem;
            letter-spacing: 6px;
            font-weight: 300;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .countdown {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="logo">BETTIN<span class="magenta">W</span>EAR</div>
    
    <div class="divider"></div>

    <div class="info">Francia • España • Portugal | Coming Soon</div>

    <div class="countdown" id="timer">00d 00h 00m 00s</div>

    <script>
        // Cuenta atrás de 15 días exactos
        const targetDate = new Date().getTime() + (15 * 24 * 60 * 60 * 1000);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = 
                `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
