<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bettinwear | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 30px; /* Margen lateral de seguridad */
            box-sizing: border-box;
            text-align: center;
            overflow-x: hidden; /* Evita que aparezca barra de desplazamiento */
        }

        .logo {
            font-size: 3.8rem;
            letter-spacing: 18px;
            font-weight: 100;
            text-transform: uppercase;
            margin-bottom: 0;
            width: 100%;
            display: block;
        }

        .magenta {
            color: #CF3476;
            font-weight: 200;
        }

        .divider {
            width: 80px;
            height: 1px;
            background-color: #CF3476;
            margin: 50px 0;
        }

        .paises {
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #888;
            font-weight: 200;
            margin-bottom: 15px;
        }

        .coming-soon {
            font-size: 1.6rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: #fff;
            font-weight: 300;
            margin-bottom: 60px;
        }

        .countdown {
            font-size: 4rem;
            font-weight: 100;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
        }

        /* AJUSTES PARA MÓVIL (Solución al corte de la R) */
        @media (max-width: 480px) {
            .logo { 
                font-size: 1.8rem; /* Tamaño más seguro para móvil */
                letter-spacing: 8px; /* Menos espacio para que quepa la R */
            }
            .divider { margin: 35px 0; }
            .paises { 
                font-size: 0.75rem; 
                letter-spacing: 3px; 
            }
            .coming-soon { 
                font-size: 1rem; 
                letter-spacing: 6px; 
            }
            .countdown { 
                font-size: 2.2rem; 
                letter-spacing: 1px; 
            }
        }

        /* Para móviles muy estrechos */
        @media (max-width: 350px) {
            .logo { 
                font-size: 1.5rem; 
                letter-spacing: 5px; 
            }
        }
    </style>
</head>
<body>

    <div class="logo">BETTIN<span class="magenta">W</span>EAR</div>
    
    <div class="divider"></div>

    <div class="paises">Francia • España • Portugal</div>
    
    <div class="coming-soon">Coming Soon</div>

    <div class="countdown" id="timer">Cargando...</div>

    <script>
        // CONFIGURACIÓN: 1 de Abril de 2026 a las 21:00h
        const targetDate = new Date("April 1, 2026 21:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("timer").innerHTML = "OPEN NOW";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const format = (num) => num.toString().padStart(2, '0');

            document.getElementById("timer").innerHTML = 
                `${format(days)}d ${format(hours)}h ${format(minutes)}m ${format(seconds)}s`;
        }

            setInterval(updateCountdown, 1000);
            updateCountdown();
    </script>
</body>
</html>
