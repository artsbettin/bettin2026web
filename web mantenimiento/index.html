<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bettinwear | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            letter-spacing: 10px;
            font-weight: 100;
            text-transform: uppercase;
            margin-bottom: 5px;
            width: 100%;
        }

        /* Tu color exacto: #CF3476 */
        .magenta {
            color: #CF3476;
            font-weight: 200;
        }

        .divider {
            width: 60px; /* Línea más corta y elegante */
            height: 1px;
            background-color: #CF3476; /* Color magenta en la línea también */
            margin: 30px 0;
        }

        .paises {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            font-weight: 200;
            margin-bottom: 10px;
        }

        .coming-soon {
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #fff;
            font-weight: 300;
            margin-bottom: 40px;
        }

        .countdown {
            font-size: 1.8rem;
            font-weight: 100;
            letter-spacing: 2px;
            color: #fff;
        }

        /* Ajustes específicos para móviles muy pequeños */
        @media (max-width: 400px) {
            .logo {
                font-size: 1.5rem;
                letter-spacing: 6px;
            }
            .countdown {
                font-size: 1.5rem;
            }
            .paises {
                font-size: 0.55rem;
            }
        }
    </style>
</head>
<body>

    <div class="logo">BETTIN<span class="magenta">W</span>EAR</div>
    
    <div class="divider"></div>

    <div class="paises">Francia • España • Portugal</div>
    
    <div class="coming-soon">Coming Soon</div>

    <div class="countdown" id="timer">00d 00h 00m 00s</div>

    <script>
        // Cuenta atrás de 15 días
        const targetDate = new Date().getTime() + (15 * 24 * 60 * 60 * 1000);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const format = (num) => num.toString().padStart(2, '0');

            document.getElementById("timer").innerHTML = 
                `${format(days)}d ${format(hours)}h ${format(minutes)}m ${format(seconds)}s`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
