<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bettinwear | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
        }

        .logo {
            font-size: 3.8rem;
            letter-spacing: 18px;
            font-weight: 100;
            text-transform: uppercase;
            margin-bottom: 0;
            width: 100%;
        }

        .magenta {
            color: #CF3476; /* Tu color exacto */
            font-weight: 200;
        }

        .divider {
            width: 100px;
            height: 1px;
            background-color: #CF3476;
            margin: 50px 0;
        }

        .paises {
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #888;
            font-weight: 200;
            margin-bottom: 15px;
        }

        .coming-soon {
            font-size: 1.6rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            color: #fff;
            font-weight: 300;
            margin-bottom: 60px;
        }

        .countdown {
            font-size: 4rem; /* Tamaño grande e impactante */
            font-weight: 100;
            letter-spacing: 5px;
            font-variant-numeric: tabular-nums; /* Evita que los números bailen */
        }

        /* Optimización para móviles (Vertical) */
        @media (max-width: 480px) {
            .logo { font-size: 2.8rem; letter-spacing: 10px; }
            .divider { margin: 40px 0; }
            .paises { font-size: 0.8rem; letter-spacing: 4px; }
            .coming-soon { font-size: 1.2rem; letter-spacing: 8px; }
            .countdown { font-size: 2.5rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="logo">BETTIN<span class="magenta">W</span>EAR</div>
    
    <div class="divider"></div>

    <div class="paises">Francia • España • Portugal</div>
    
    <div class="coming-soon">Coming Soon</div>

    <div class="countdown" id="timer">Cargando...</div>

    <script>
        // CONFIGURACIÓN EXACTA: 1 de Abril de 2026 a las 21:00h
        const targetDate = new Date("April 1, 2026 21:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("timer").innerHTML = "OPEN NOW";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const format = (num) => num.toString().padStart(2, '0');

            document.getElementById("timer").innerHTML = 
                `${format(days)}d ${format(hours)}h ${format(minutes)}m ${format(seconds)}s`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
