<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bettinwear | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px; /* Más espacio en los bordes */
            box-sizing: border-box;
            text-align: center;
        }

        .logo {
            font-size: 3.2rem; /* Mucho más grande */
            letter-spacing: 15px; /* Más espaciado para que ocupe ancho */
            font-weight: 100;
            text-transform: uppercase;
            margin-bottom: 10px;
            width: 100%;
        }

        .magenta {
            color: #CF3476; /* Tu color exacto */
            font-weight: 200;
        }

        .divider {
            width: 80px; /* Línea un poco más larga */
            height: 1px;
            background-color: #CF3476;
            margin: 40px 0; /* Más separación */
        }

        .paises {
            font-size: 0.9rem; /* Letra más legible */
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #aaa;
            font-weight: 200;
            margin-bottom: 15px;
        }

        .coming-soon {
            font-size: 1.2rem; /* Más presencia */
            letter-spacing: 8px;
            text-transform: uppercase;
            color: #fff;
            font-weight: 300;
            margin-bottom: 60px; /* Más espacio antes del reloj */
        }

        .countdown {
            font-size: 3.5rem; /* El reloj ahora es el protagonista */
            font-weight: 100;
            letter-spacing: 4px;
            color: #fff;
        }

        /* Ajustes para móviles (pantallas pequeñas y verticales) */
        @media (max-width: 480px) {
            .logo {
                font-size: 2.2rem; /* Se ajusta para que no se corte en móvil */
                letter-spacing: 10px;
            }
            .countdown {
                font-size: 2.2rem;
            }
            .paises {
                font-size: 0.7rem;
                letter-spacing: 3px;
            }
            .coming-soon {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="logo">BETTIN<span class="magenta">W</span>EAR</div>
    
    <div class="divider"></div>

    <div class="paises">Francia • España • Portugal</div>
    
    <div class="coming-soon">Coming Soon</div>

    <div class="countdown" id="timer">00d 00h 00m 00s</div>

    <script>
        // Cuenta atrás de 15 días
        const targetDate = new Date().getTime() + (15 * 24 * 60 * 60 * 1000);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const format = (num) => num.toString().padStart(2, '0');

            document.getElementById("timer").innerHTML = 
                `${format(days)}d ${format(hours)}h ${format(minutes)}m ${format(seconds)}s`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
