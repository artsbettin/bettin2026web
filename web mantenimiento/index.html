<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bettinwear | Official Store</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:title" content="Bettinwear | Official Store">
    <meta property="og:description" content="Francia • España • Portugal. Únete a la lista privada y recibe un obsequio exclusivo el 01.04.">
    <meta property="og:image" content="preview.png">

    <script async type="text/javascript" src="https://static.klaviyo.com/onsite/js/klaviyo.js?company_id=pk_4e9930ef2b13354fccd3795c1c91d8cb88"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 30px; /* Margen lateral de seguridad */
            box-sizing: border-box;
            text-align: center;
            overflow-x: hidden;
        }

        .logo {
            font-size: 3.5rem;
            letter-spacing: 15px;
            font-weight: 100;
            text-transform: uppercase;
            margin-bottom: 0;
            width: 100%;
        }

        .magenta { color: #CF3476; font-weight: 200; }

        .divider {
            width: 60px;
            height: 1px;
            background-color: #CF3476;
            margin: 40px 0;
        }

        .paises {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            font-weight: 200;
            margin-bottom: 10px;
        }

        .coming-soon {
            font-size: 1.4rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 300;
            margin-bottom: 35px;
        }

        .newsletter-container {
            margin-bottom: 50px;
            width: 100%;
            max-width: 420px;
        }

        .gift-text {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #CF3476;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .klaviyo_styling {
            display: flex;
            gap: 10px;
        }

        input[type="email"] {
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 14px 15px;
            flex-grow: 1;
            font-family: 'Inter', sans-serif;
            outline: none;
            border-radius: 0;
        }

        input[type="email"]:focus { border-color: #CF3476; }

        .btn-submit {
            background-color: #CF3476;
            color: white;
            border: none;
            padding: 14px 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 0;
        }

        .countdown {
            font-size: 3rem;
            font-weight: 100;
            letter-spacing: 4px;
        }

        @media (max-width: 480px) {
            .logo { font-size: 1.7rem; letter-spacing: 6px; }
            .coming-soon { font-size: 1rem; letter-spacing: 5px; }
            .countdown { font-size: 2.2rem; }
            .klaviyo_styling { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="logo">BETTIN<span class="magenta">W</span>EAR</div>
    <div class="divider"></div>
    <div class="paises">Francia • España • Portugal</div>
    <div class="coming-soon">Coming Soon</div>

    <div class="newsletter-container">
        <div class="gift-text" id="status-msg">Únete a la lista privada y recibe un obsequio exclusivo en la apertura</div>
        <form id="email_signup" class="klaviyo_styling">
            <input type="email" id="k_id_email" placeholder="TU EMAIL" required>
            <button type="submit" class="btn-submit">UNIRSE</button>
        </form>
    </div>

    <div class="countdown" id="timer">...</div>

    <script>
        // Reloj
        const targetDate = new Date("April 1, 2026 21:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            if (distance < 0) { document.getElementById("timer").innerHTML = "OPEN NOW"; return; }
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            const format = (num) => num.toString().padStart(2, '0');
            document.getElementById("timer").innerHTML = `${format(days)}d ${format(hours)}h ${format(minutes)}m ${format(seconds)}s`;
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Envío Klaviyo (AJAX)
        document.getElementById('email_signup').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('k_id_email').value;
            const btn = e.target.querySelector('button');
            const msg = document.getElementById('status-msg');
            btn.innerHTML = "...";
            btn.disabled = true;

            fetch('https://manage.kmail-lists.com/ajax/subscriptions/subscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    'g': 'Xyn3sR', // Tu List ID real de Klaviyo
                    '$fields': '$source',
                    '$source': 'Web Mantenimiento',
                    'email': email
                })
            })
            .then(() => {
                msg.innerHTML = "¡GRACIAS! TE HEMOS AÑADIDO A LA LISTA";
                msg.style.color = "#fff";
                e.target.style.display = 'none';
            })
            .catch(() => { btn.innerHTML = "ERROR"; btn.disabled = false; });
        });
    </script>
</body>
</html>
